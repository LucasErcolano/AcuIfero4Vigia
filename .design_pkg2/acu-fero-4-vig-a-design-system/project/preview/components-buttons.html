<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Buttons</div>
<div style="margin-top:16px; display:flex; gap:10px; flex-wrap:wrap;">
  <button style="background:#2563EB; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:600; font-size:14px; display:inline-flex; align-items:center; gap:8px; font-family:inherit;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    Submit Report
  </button>
  <button style="background:#F97316; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:600; font-size:14px; display:inline-flex; align-items:center; gap:8px; font-family:inherit;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"></path><path d="M5 12l7-7"></path><path d="M5 12l7 7"></path><path d="M21 6v6"></path></svg>
    Save Offline
  </button>
  <button style="background:white; color:var(--fg-2); border:1px solid var(--border-strong); padding:10px 18px; border-radius:8px; font-weight:500; font-size:14px; display:inline-flex; align-items:center; gap:8px; font-family:inherit;">
    Adjust calibration
  </button>
  <button style="background:#FFF7ED; color:#9A3412; border:1px solid #FED7AA; padding:10px 18px; border-radius:8px; font-weight:600; font-size:14px; display:inline-flex; align-items:center; gap:8px; font-family:inherit;">
    Analyze bundled sample
  </button>
  <button disabled style="background:#D1D5DB; color:white; border:none; padding:10px 18px; border-radius:8px; font-weight:600; font-size:14px; font-family:inherit; cursor:not-allowed;">
    Sending…
  </button>
</div>
<div class="muted" style="margin-top:16px;">Primary · Orange CTA (offline-save) · Ghost · Soft-warn · Disabled. Hover: -100 step on the same hue.</div>
</body></html>
