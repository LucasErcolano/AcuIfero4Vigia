    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <title>title_card — HyperFrames</title>
      <link rel="stylesheet" href="_shared.css" />
      <style>
        html, body {
          margin: 0;
          padding: 0;
          background: var(--bg);
          width: 1920px;
          height: 1080px;
          overflow: hidden;
        }
      </style>
    </head>
    <body>
      <div data-composition-id="title_card" data-start="0" data-width="1920" data-height="1080" data-duration="5.0" style="width:1920px;height:1080px;position:relative;">
          <style>.stage { display: grid; place-items: center; }
.card { text-align: center; }
.brand {
  font-size: 96px;
  font-weight: 700;
  letter-spacing: 1px;
  background: linear-gradient(90deg, var(--teal), #c8e1ff 60%, var(--amber));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0 0 16px 0;
}
.tagline {
  font-size: 32px;
  color: var(--text);
  margin: 0 0 12px 0;
  font-weight: 400;
}
.meta {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--muted);
  margin-top: 24px;
  letter-spacing: 1px;
}</style>
  <div class="stage">
  <div class="card">
    <h1 class="brand">ACUÍFERO + VIGÍA</h1>
    <p class="tagline">Local flood intelligence when the network fails.</p>
    <div class="meta">GEMMA 4 GOOD HACKATHON · GLOBAL RESILIENCE TRACK</div>
  </div>
  <div class="watermark">MVP DEMO — public/simulated scenario</div>
</div>

      </div>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        tl.from(".brand",   { y: 60, opacity: 0, duration: 1.0, ease: "power3.out" }, 0.2);
tl.from(".tagline", { y: 30, opacity: 0, duration: 0.9, ease: "power2.out" }, 0.8);
tl.from(".meta",    { opacity: 0, duration: 0.7, ease: "power2.out" }, 1.6);
tl.from(".watermark", { opacity: 0, duration: 0.6, ease: "none" }, 0.4);

        // Pad timeline to target duration so the final state holds
        tl.to({}, { duration: Math.max(0.1, 5.0 - tl.totalDuration()) });
        window.__timelines["title_card"] = tl;
      </script>
    </body>
    </html>
