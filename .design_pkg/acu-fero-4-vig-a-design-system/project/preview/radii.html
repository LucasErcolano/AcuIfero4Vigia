<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Radii</div>
<div style="margin-top:14px; display:flex; gap:16px; align-items:flex-end;">
  <div style="text-align:center;">
    <div style="width:72px; height:72px; background:#EFF6FF; border:1px solid #BFDBFE; border-radius:4px;"></div>
    <div class="token-name" style="margin-top:8px;">4px</div>
    <div class="token-meta">badges, tags</div>
  </div>
  <div style="text-align:center;">
    <div style="width:72px; height:72px; background:#EFF6FF; border:1px solid #BFDBFE; border-radius:8px;"></div>
    <div class="token-name" style="margin-top:8px;">8px <span style="color:var(--fg-3); font-weight:400;">default</span></div>
    <div class="token-meta">buttons, inputs, cards</div>
  </div>
  <div style="text-align:center;">
    <div style="width:72px; height:72px; background:#EFF6FF; border:1px solid #BFDBFE; border-radius:12px;"></div>
    <div class="token-name" style="margin-top:8px;">12px</div>
    <div class="token-meta">section containers</div>
  </div>
  <div style="text-align:center;">
    <div style="width:72px; height:72px; background:#EFF6FF; border:1px solid #BFDBFE; border-radius:9999px;"></div>
    <div class="token-name" style="margin-top:8px;">full</div>
    <div class="token-meta">pills, chips, toggle</div>
  </div>
</div>
</body></html>
