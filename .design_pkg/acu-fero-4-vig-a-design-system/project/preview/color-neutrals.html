<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Neutral spine — gray-50 → gray-900</div>
<div style="margin-top:14px; display:grid; grid-template-columns:repeat(10, 1fr); gap:6px;">
  <div><div style="height:56px; background:#F9FAFB; border:1px solid var(--border); border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">50</div></div>
  <div><div style="height:56px; background:#F3F4F6; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">100</div></div>
  <div><div style="height:56px; background:#E5E7EB; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">200</div></div>
  <div><div style="height:56px; background:#D1D5DB; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">300</div></div>
  <div><div style="height:56px; background:#9CA3AF; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">400</div></div>
  <div><div style="height:56px; background:#6B7280; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">500</div></div>
  <div><div style="height:56px; background:#4B5563; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">600</div></div>
  <div><div style="height:56px; background:#374151; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">700</div></div>
  <div><div style="height:56px; background:#1F2937; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">800</div></div>
  <div><div style="height:56px; background:#111827; border-radius:6px;"></div><div style="font-size:10px; margin-top:6px; color:var(--fg-3); font-family:var(--font-mono); text-align:center;">900</div></div>
</div>
<div class="muted" style="margin-top:14px;">Tailwind-equivalent spine. Body text → 900 · meta → 500/600 · borders → 200 · bg → 50.</div>
</body></html>
