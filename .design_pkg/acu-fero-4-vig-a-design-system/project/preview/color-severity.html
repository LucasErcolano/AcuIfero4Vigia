<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="label-eyebrow">Severity — FusedAlert levels (API: alert.level)</div>
<div style="margin-top:12px; display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;">
  <div style="background:#DCFCE7; border:1px solid #BBF7D0; border-radius:8px; padding:14px;">
    <div style="font-size:13px; font-weight:700; color:#166534;">GREEN</div>
    <div style="font-size:11px; color:#166534; margin-top:6px; line-height:1.4;">Nominal · synced</div>
    <div class="mono" style="font-size:10px; color:#166534; margin-top:8px; opacity:0.75;">#DCFCE7 / #166534</div>
  </div>
  <div style="background:#FEF3C7; border:1px solid #FDE68A; border-radius:8px; padding:14px;">
    <div style="font-size:13px; font-weight:700; color:#854D0E;">YELLOW</div>
    <div style="font-size:11px; color:#854D0E; margin-top:6px; line-height:1.4;">Watch · single signal</div>
    <div class="mono" style="font-size:10px; color:#854D0E; margin-top:8px; opacity:0.75;">#FEF3C7 / #854D0E</div>
  </div>
  <div style="background:#FFEDD5; border:1px solid #FED7AA; border-radius:8px; padding:14px;">
    <div style="font-size:13px; font-weight:700; color:#9A3412;">ORANGE</div>
    <div style="font-size:11px; color:#9A3412; margin-top:6px; line-height:1.4;">Warning · corroborated</div>
    <div class="mono" style="font-size:10px; color:#9A3412; margin-top:8px; opacity:0.75;">#FFEDD5 / #9A3412</div>
  </div>
  <div style="background:#FEE2E2; border:1px solid #FECACA; border-radius:8px; padding:14px;">
    <div style="font-size:13px; font-weight:700; color:#991B1B;">RED</div>
    <div style="font-size:11px; color:#991B1B; margin-top:6px; line-height:1.4;">Critical · line crossed</div>
    <div class="mono" style="font-size:10px; color:#991B1B; margin-top:8px; opacity:0.75;">#FEE2E2 / #991B1B</div>
  </div>
</div>
</body></html>
