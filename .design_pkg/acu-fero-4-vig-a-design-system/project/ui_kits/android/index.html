<!DOCTYPE html>
<html lang="en" data-screen-label="Volunteer App (Android)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acuifero 4 + Vigia — Volunteer App</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #2A2520;
      display: flex; align-items: center; justify-content: center;
      padding: 32px;
      font-family: Roboto, "Segoe UI", system-ui, sans-serif;
    }
    .stage {
      display: flex; flex-direction: column; gap: 18px; align-items: center;
    }
    .caption {
      color: #BFAE8F; font-size: 13px; max-width: 380px; text-align: center; line-height: 1.5;
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="AndroidApp.jsx"></script>
  <script type="text/babel" src="AndroidDashboard.jsx"></script>
  <script type="text/babel" src="AndroidSiteDetail.jsx"></script>
  <script type="text/babel" src="AndroidQueue.jsx"></script>
  <script type="text/babel" src="AndroidSettings.jsx"></script>

  <script type="text/babel">
    // Sample data
    const SAMPLE_SITES_ANDROID = [
      { id: 'silverado-fixed-cam-usgs', name: 'Silverado Fixed Cam', region: 'USGS demo', is_active: true, last_alert: 'red' },
      { id: 'parana-bajo', name: 'Paraná Bajo', region: 'Entre Ríos', is_active: true, last_alert: 'orange' },
      { id: 'arroyo-yacare', name: 'Arroyo Yacaré', region: 'Chaco', is_active: true, last_alert: 'yellow' },
      { id: 'bahia-blanca-canal', name: 'Bahía Blanca · canal', region: 'Buenos Aires', is_active: false },
    ];

    const SAMPLE_RUNTIME_ANDROID = {
      llm: { model: 'gemma4:e2b', reachable: true },
      hydromet: { reachable: true, detail: 'Open-Meteo OK' },
    };

    const SAMPLE_ANALYSIS_ANDROID = {
      observation: {
        frames_analyzed: 126,
        waterline_ratio: 0.42,
        confidence: 0.78,
        image_description: 'Agua turbia cubre la franja inferior del encuadre y supera la línea crítica calibrada. Vegetación parcialmente sumergida en el margen derecho.',
      },
      alert: {
        level: 'red',
        score: 0.87,
        summary: 'Línea crítica cruzada a t=078s. Corroborado por reporte voluntario y prob. lluvia 68%.',
      },
    };

    const INITIAL_QUEUE = [
      { id: 1, site_id: 'parana-bajo', reporter_name: 'María G.', reporter_role: 'brigadista',
        transcript: 'El agua ya cruzó la marca crítica y trae barro, evacuar zona baja.',
        createdAt: Date.now() - 1000 * 60 * 12 },
    ];

    function App() {
      const [route, setRoute] = React.useState('dashboard');
      const [selectedSite, setSelectedSite] = React.useState(null);
      const [analysis, setAnalysis] = React.useState(null);
      const [analyzing, setAnalyzing] = React.useState(false);
      const [refreshing, setRefreshing] = React.useState(false);
      const [queue, setQueue] = React.useState(INITIAL_QUEUE);
      const [serverUrl, setServerUrl] = React.useState('http://10.0.2.2:8000/api/');
      const [isOnline, setIsOnline] = React.useState(true);
      const [flushing, setFlushing] = React.useState(false);

      const dashboard = { sites: SAMPLE_SITES_ANDROID, runtime: SAMPLE_RUNTIME_ANDROID };
      const site = selectedSite ? SAMPLE_SITES_ANDROID.find((s) => s.id === selectedSite) : null;

      const openSite = (id) => { setSelectedSite(id); setAnalysis(null); setRoute('site-detail'); };

      const screen = (() => {
        if (route === 'site-detail' && site) {
          return (
            <AndroidSiteDetail
              site={site}
              analysis={analysis}
              isAnalyzing={analyzing}
              isRefreshing={refreshing}
              onAnalyzeSample={() => {
                setAnalyzing(true);
                setTimeout(() => { setAnalysis(SAMPLE_ANALYSIS_ANDROID); setAnalyzing(false); }, 900);
              }}
              onRefreshHydromet={() => {
                setRefreshing(true);
                setTimeout(() => setRefreshing(false), 600);
              }}
              onSubmitReport={(r) => {
                setQueue((q) => [...q, { id: Date.now(), site_id: site.id, reporter_name: r.name, reporter_role: r.role, transcript: r.transcript, createdAt: Date.now() }]);
                setRoute('queue');
              }}
              onBack={() => { setSelectedSite(null); setRoute('dashboard'); }}
            />
          );
        }
        if (route === 'queue') {
          return (
            <AndroidQueue
              reports={queue}
              isOnline={isOnline}
              isFlushing={flushing}
              onFlush={() => {
                if (!isOnline) return;
                setFlushing(true);
                setTimeout(() => { setQueue([]); setFlushing(false); }, 600);
              }}
            />
          );
        }
        if (route === 'settings') {
          return (
            <AndroidSettings
              serverUrl={serverUrl}
              setServerUrl={setServerUrl}
              isOnline={isOnline}
              setOnline={setIsOnline}
            />
          );
        }
        return <AndroidDashboard dashboard={dashboard} queueCount={queue.length} onOpenSite={openSite} />;
      })();

      const isOnSiteDetail = route === 'site-detail';

      return (
        <div className="stage">
          <AndroidDevice width={412} height={892}>
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            {/* Custom app bar replacing the starter app bar to control colors */}
            <div style={{
              background: '#0D3B2A',
              color: '#FFFFFF',
              padding: '14px 20px',
              display: 'flex', alignItems: 'center', gap: 10,
              fontFamily: 'Roboto, system-ui, sans-serif',
            }}>
              <div style={{
                width: 30, height: 30, borderRadius: '50%',
                background: '#1476B8', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              </div>
              <div style={{ fontSize: 17, fontWeight: 600, letterSpacing: '-0.01em' }}>
                Acuifero 4 + Vigia
              </div>
              <div style={{ marginLeft: 'auto' }}>
                <span style={{
                  background: isOnline ? '#1476B8' : '#B45F22', color: '#FFFFFF',
                  fontSize: 10, fontWeight: 600, padding: '4px 8px', borderRadius: 9999, letterSpacing: '0.04em',
                }}>{isOnline ? 'ONLINE' : 'OFFLINE'}</span>
              </div>
            </div>

            {screen}

            {!isOnSiteDetail && (
              <AndroidBottomNav route={route} setRoute={setRoute} queueCount={queue.length} />
            )}
            {isOnSiteDetail && (
              <AndroidBottomNav route="dashboard" setRoute={(r) => { setSelectedSite(null); setRoute(r); }} queueCount={queue.length} />
            )}
          </div>
          </AndroidDevice>

          <div className="caption">
            Phone-framed click-thru of the volunteer app. Tap a site → analyze the demo clip → submit a report → watch it move into the queue.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
