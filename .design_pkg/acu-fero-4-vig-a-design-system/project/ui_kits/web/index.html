<!DOCTYPE html>
<html lang="en" data-screen-label="Operator Console">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acuifero 4 + Vigia — Operator Console</title>
  <link rel="stylesheet" href="kit.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Layout.jsx"></script>
  <script type="text/babel" src="Dashboard.jsx"></script>
  <script type="text/babel" src="SiteDetail.jsx"></script>
  <script type="text/babel" src="ReportForm.jsx"></script>
  <script type="text/babel" src="Queue.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>

  <script type="text/babel">
    // ---- Sample state ----
    const SAMPLE_SITES = [
      {
        id: 'silverado-fixed-cam-usgs',
        name: 'Silverado Fixed Cam (USGS)',
        region: 'California — USGS public clip',
        description: 'Bundled demo site for end-to-end CV + fused-alert validation. Drives the smoke-test pipeline.',
        is_active: true,
      },
      {
        id: 'parana-bajo',
        name: 'Paraná Bajo · Brigada La Boca',
        region: 'Entre Ríos · Argentina',
        description: 'Volunteer brigade node on the lower Paraná. Reports collected via Android volunteer app, queued offline.',
        is_active: true,
      },
      {
        id: 'arroyo-yacare',
        name: 'Arroyo Yacaré',
        region: 'Chaco · Argentina',
        description: 'Fixed CV node monitoring a tributary that floods first on a wet season.',
        is_active: true,
      },
      {
        id: 'bahia-blanca-canal',
        name: 'Bahía Blanca · canal urbano',
        region: 'Buenos Aires · Argentina',
        description: 'Urban canal node added after the 2025 Bahía Blanca event. Currently calibrating.',
        is_active: false,
      },
    ];

    const SAMPLE_ALERTS = [
      {
        id: 1,
        site_id: 'silverado-fixed-cam-usgs',
        level: 'red',
        score: 0.87,
        summary: 'Waterline crossed critical line at t=078s. Corroborated by 1 brigadista report and 12h rain probability 68%.',
        trigger_source: 'fused',
        reasoning_summary: 'La franja media-baja del cuadro pasó de seco a turbio en 12 frames consecutivos. Velocidad de subida 0.0034/frame supera el umbral interno (0.0020). Reporte voluntario en español describe "agua que cruzó la marca crítica y trae barro" — coincide con el detector visual. Confianza 78%.',
        reasoning_model: 'gemma4:e2b',
      },
      {
        id: 2,
        site_id: 'parana-bajo',
        level: 'orange',
        score: 0.64,
        summary: 'Single brigadista report of muddy water and a 9 mm rain spike in the last hour. No CV node corroboration yet.',
        trigger_source: 'volunteer',
        reasoning_summary: 'Reporte único de un brigadista clasificado como urgencia media. Sin corroboración visual aún — falta confirmación con la próxima ventana de análisis del nodo CV.',
        reasoning_model: 'gemma4:e2b',
      },
      {
        id: 3,
        site_id: 'arroyo-yacare',
        level: 'yellow',
        score: 0.31,
        summary: 'Sustained rainfall 11 mm/3h. Waterline ratio nominal. Watch state — re-evaluate in 30 minutes.',
        trigger_source: 'hydromet',
      },
    ];

    const SAMPLE_SNAPSHOT = {
      site_id: 'silverado-fixed-cam-usgs',
      signal_score: 0.62,
      summary: 'Sustained light rain over the past 6 hours; river discharge trending upward.',
      precipitation_mm: 12.4,
      precipitation_probability: 68,
      river_discharge: 185.4,
    };

    const SAMPLE_CALIBRATION = {
      critical_line: [[0, 120], [700, 120]],
      notes: 'ROI calibrated 2025-04-12 against the bundled USGS Silverado clip.',
    };

    const SAMPLE_ANALYSIS = {
      observation: {
        frames_analyzed: 126,
        waterline_ratio: 0.42,
        rise_velocity: 0.0034,
        confidence: 0.78,
        crossed_critical_line: true,
        image_description: 'Agua turbia cubre la franja inferior del encuadre y supera la línea crítica calibrada. Vegetación parcialmente sumergida en el margen derecho; no se aprecia infraestructura en riesgo todavía.',
        image_assessment_model: 'gemma4:e2b',
        image_assessment_confidence: 0.78,
      },
      alert: {
        level: 'red',
        score: 0.87,
        summary: 'Waterline crossed critical line at t=078s. Corroborated by 1 brigadista report and 12h rain probability 68%.',
        reasoning_summary: 'La franja media-baja del cuadro pasó de seco a turbio en 12 frames consecutivos. Velocidad de subida 0.0034/frame supera el umbral interno (0.0020). Reporte voluntario en español confirma el cruce de la marca crítica.',
        reasoning_model: 'gemma4:e2b',
      },
    };

    const SAMPLE_RUNTIME = {
      is_online: true,
      llm: { enabled: true, reachable: true, base_url: 'http://127.0.0.1:11434/v1', model: 'gemma4:e2b', detail: 'Ollama OpenAI-compatible endpoint · 12 GB VRAM headroom' },
      hydromet: { enabled: true, reachable: true, detail: 'Open-Meteo · forecast + flood archive' },
    };

    const SAMPLE_QUEUE = [
      { id: 1, site_id: 'parana-bajo', reporter_name: 'María G.', reporter_role: 'Community Member',
        transcript_text: 'El agua ya cruzó la marca crítica y trae barro, evacuar zona baja.',
        photo_attachment: { name: 'parana_2025_05_16.jpg' }, audio_attachment: null,
        createdAt: Date.now() - 1000 * 60 * 12 },
      { id: 2, site_id: 'arroyo-yacare', reporter_name: 'J. Ferreyra', reporter_role: 'Local Official',
        transcript_text: 'Llueve sostenido desde hace tres horas, el arroyo subió como medio metro pero no llegó al camino todavía.',
        photo_attachment: null, audio_attachment: { name: 'voz_brigadista.m4a' },
        createdAt: Date.now() - 1000 * 60 * 6 },
    ];

    // ---- App shell ----
    function App() {
      const [route, setRoute] = React.useState('dashboard');
      const [selectedSite, setSelectedSite] = React.useState(null);
      const [isOnline, setIsOnline] = React.useState(true);
      const [flashSynced, setFlashSynced] = React.useState(false);
      const [queue, setQueue] = React.useState(SAMPLE_QUEUE);
      const [analysis, setAnalysis] = React.useState(null);
      const [refreshing, setRefreshing] = React.useState(false);
      const [analyzing, setAnalyzing] = React.useState(false);
      const [flushing, setFlushing] = React.useState(false);

      const toggleOnline = () => {
        const next = !isOnline;
        setIsOnline(next);
        if (next && queue.length > 0) {
          // simulate auto-flush
          setTimeout(() => {
            setQueue([]);
            setFlashSynced(true);
            setTimeout(() => setFlashSynced(false), 2500);
          }, 600);
        }
      };

      const openSite = (id) => {
        setSelectedSite(id);
        setAnalysis(null);
        setRoute('site-detail');
      };

      const refreshHydromet = () => {
        setRefreshing(true);
        setTimeout(() => setRefreshing(false), 700);
      };

      const analyzeSample = () => {
        setAnalyzing(true);
        setTimeout(() => {
          setAnalysis(SAMPLE_ANALYSIS);
          setAnalyzing(false);
        }, 1200);
      };

      const submitReport = (report) => {
        setQueue((q) => [...q, { ...report, id: Date.now(), createdAt: Date.now() }]);
        if (isOnline) {
          setTimeout(() => {
            setQueue([]);
            setFlashSynced(true);
            setTimeout(() => setFlashSynced(false), 2500);
          }, 400);
        }
        setRoute('dashboard');
      };

      const flushQueue = () => {
        setFlushing(true);
        setTimeout(() => {
          setQueue([]);
          setFlushing(false);
          setFlashSynced(true);
          setTimeout(() => setFlashSynced(false), 2500);
        }, 600);
      };

      const deleteQueued = (id) => setQueue((q) => q.filter((r) => r.id !== id));

      const site = selectedSite ? SAMPLE_SITES.find((s) => s.id === selectedSite) : null;

      return (
        <Layout
          route={route === 'site-detail' ? null : route}
          setRoute={(r) => { setRoute(r); setSelectedSite(null); }}
          isOnline={isOnline}
          toggleOnline={toggleOnline}
          queueCount={queue.length}
          flashSynced={flashSynced}
        >
          {route === 'dashboard' && (
            <Dashboard
              alerts={isOnline ? SAMPLE_ALERTS : []}
              sites={isOnline ? SAMPLE_SITES : []}
              isOnline={isOnline}
              onOpenSite={openSite}
            />
          )}
          {route === 'site-detail' && (
            <SiteDetail
              site={site}
              snapshot={isOnline ? SAMPLE_SNAPSHOT : null}
              calibration={SAMPLE_CALIBRATION}
              analysis={analysis}
              onBack={() => { setSelectedSite(null); setRoute('dashboard'); }}
              onRefreshHydromet={refreshHydromet}
              onAnalyzeSample={analyzeSample}
              isRefreshing={refreshing}
              isAnalyzingSample={analyzing}
            />
          )}
          {route === 'report' && (
            <ReportForm sites={SAMPLE_SITES} isOnline={isOnline} onSubmit={submitReport} />
          )}
          {route === 'queue' && (
            <Queue reports={queue} isOnline={isOnline} onFlush={flushQueue} onDelete={deleteQueued} isFlushing={flushing} />
          )}
          {route === 'settings' && (
            <Settings runtime={isOnline ? SAMPLE_RUNTIME : { ...SAMPLE_RUNTIME, llm: { ...SAMPLE_RUNTIME.llm, reachable: false, detail: 'No connection — local fallback active' }, hydromet: { ...SAMPLE_RUNTIME.hydromet, reachable: false, detail: 'No connection' }, is_online: false }} />
          )}
        </Layout>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
